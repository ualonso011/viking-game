name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "LasCenizasDelOso"

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot 4.3
        run: |
          # Download Godot editor binary
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          
          # Download export templates
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          
          # Install export templates
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip -q Godot_v4.3-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.3.stable/
          # The tpz contains a "templates/" subdir; move contents up
          if [ -d ~/.local/share/godot/export_templates/4.3.stable/templates ]; then
            mv ~/.local/share/godot/export_templates/4.3.stable/templates/* ~/.local/share/godot/export_templates/4.3.stable/
            rmdir ~/.local/share/godot/export_templates/4.3.stable/templates
          fi
          
          echo "Godot installed at: $(pwd)"
          ls -la Godot_v4.3-stable_linux.x86_64
          ls -la ~/.local/share/godot/export_templates/4.3.stable/

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Create Android debug keystore
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/android.keystore \
            -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Dev, OU=Dev, O=VikingGame, L=City, S=None, C=US"

      - name: Export Android APK
        run: |
          mkdir -p build
          ./Godot_v4.3-stable_linux.x86_64 --headless \
            --export-debug "Android" build/${{ env.EXPORT_NAME }}.apk 2>&1

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Android
          path: build/
          retention-days: 30
