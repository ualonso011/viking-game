name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  EXPORT_NAME: "LasCenizasDelOso"

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest

    container:
      image: barichello/godot-ci:4.3-android

    defaults:
      run:
        working-directory: /github/workspace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate placeholders
        run: |
          godot --headless --script assets/sprites/generate_placeholders.gd --quit 2>/dev/null || true
          echo "Placeholders done"

      - name: Create Android debug keystore
        run: |
          keytool -genkey -v -keystore /tmp/android.keystore \
            -alias android -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Dev, OU=Dev, O=VikingGame, L=City, S=State, C=US"

      - name: Export Android APK
        run: |
          mkdir -p build
          export GODOT_ANDROID_KEYSTORE_DEBUG_PATH=/tmp/android.keystore
          export GODOT_ANDROID_KEYSTORE_DEBUG_USER=android
          export GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android
          godot --headless --export-debug "Android" build/${{ env.EXPORT_NAME }}.apk 2>&1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Android
          path: build/
          retention-days: 30
