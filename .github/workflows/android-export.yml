name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "LasCenizasDelOso"

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot 4.3
        run: |
          # Download Godot editor binary
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          
          # Download export templates
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          
          # Install export templates
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip -q Godot_v4.3-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.3.stable/
          # The tpz contains a "templates/" subdir; move contents up
          if [ -d ~/.local/share/godot/export_templates/4.3.stable/templates ]; then
            mv ~/.local/share/godot/export_templates/4.3.stable/templates/* ~/.local/share/godot/export_templates/4.3.stable/
            rmdir ~/.local/share/godot/export_templates/4.3.stable/templates
          fi
          
          echo "Godot installed at: $(pwd)"
          ls -la Godot_v4.3-stable_linux.x86_64
          ls -la ~/.local/share/godot/export_templates/4.3.stable/

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android debug keystore
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/android.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Dev, OU=Dev, O=VikingGame, L=City, S=None, C=US"
          # Point export_presets.cfg to the generated keystore
          sed -i 's|keystore/debug=""|keystore/debug="'"${{ github.workspace }}"'/android.keystore"|' export_presets.cfg

      - name: Validate project and export
        run: |
          mkdir -p build
          
          # Check Godot binary
          echo "=== Godot version ==="
          ./Godot_v4.3-stable_linux.x86_64 --headless --version 2>&1 || echo "GODOT_BINARY_FAILED"
          
          # Check export templates
          echo "=== Export templates ==="
          ls -la ~/.local/share/godot/export_templates/4.3.stable/ 2>&1
          
          # Check project.godot key lines
          echo "=== Rendering config ==="
          grep -n "rendering" project.godot
          
          echo "=== Export preset config ==="
          head -10 export_presets.cfg
          
          echo "=== Android SDK ==="
          echo "ANDROID_HOME=${ANDROID_HOME:-not set}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-not set}"
          
          # Run export with full output
          echo "=== Running export ==="
          ./Godot_v4.3-stable_linux.x86_64 --headless \
            --export-debug "Android" "build/${{ env.EXPORT_NAME }}.apk" 2>&1
          EXIT_CODE=$?
          echo "=== Exit code: $EXIT_CODE ==="
          exit $EXIT_CODE

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Android
          path: build/
          retention-days: 30
